<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<style>
table {
  width: 100%;
  border-collapse: collapse;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
  font-family: sans-serif;
}

/* Efeito Zebra */
tr:nth-child(even) {
  background-color: #9c9797; 
}

th, td {
  border: 1px solid black;
  padding: 6px;
  text-align: center;
  width: 25%;
}

th {
  background-color: #ddd;
  font-weight: bold;
}
</style>
</head>
<body>

<table>
  <thead>
    <tr>
      <th colspan="4" id="mes-e-data"></th>
    </tr>
  </thead>
  <tbody id="tabela-corpo">
    </tbody>
</table>

<script>
  // 1. Data no cabeçalho
  const dataAtual = new Date();
  const opcoesMes = { month: 'long' };
  let mes = dataAtual.toLocaleDateString('pt-BR', opcoesMes).toUpperCase();
  const dia = dataAtual.getDate();
  document.getElementById('mes-e-data').textContent = `${mes} (DIA ${dia})`;

  // 2. Sua sequência original (mantendo a ordem fornecida)
  const sequenciaOriginal = [
    10, 16, 113, 42, 21, 23, 15, 19, 72, 76, 65, 30, 144, 55, 52, 94, 83, 116, 51, 48, 
    100, 88, 118, 143, 114, 142, 33, 121, 7, 13, 102, 95, 111, 133, 101, 147, 148, 99, 
    102, 108, 126, 124, 110, 130, 67, 71, 29, 50, 112, 97, 140, 117, 120, 92, 107, 77, 
    63, 138, 6, 2, 141, 68, 1, 73, 17, 25, 9, 132, 20, 69, 134, 98, 104, 62, 82, 127, 
    128, 37, 136, 11, 93, 57, 119, 18, 24, 125, 90, 129, 8, 3, 26, 58, 61, 80, 137, 44
  ];

  // 3. Identificar números faltantes de 1 a 165
  const conjuntoOriginal = new Set(sequenciaOriginal);
  const faltantes = [];
  for (let i = 1; i <= 165; i++) {
    if (!conjuntoOriginal.has(i)) {
      faltantes.push(i);
    }
  }

  // 4. Combinar: Lista fornecida + Faltantes (em ordem crescente)
  const listaCompleta = [...sequenciaOriginal, ...faltantes];

  // 5. Renderizar na tabela (2 números por linha)
  const corpoTabela = document.getElementById('tabela-corpo');
  for (let i = 0; i < listaCompleta.length; i += 2) {
    const tr = document.createElement('tr');
    
    const num1 = listaCompleta[i];
    const num2 = listaCompleta[i + 1] !== undefined ? listaCompleta[i + 1] : "";

    tr.innerHTML = `
      <td>${num1}</td>
      <td></td>
      <td>${num2}</td>
      <td></td>
    `;
    corpoTabela.appendChild(tr);
  }
</script>

</body>
</html>
